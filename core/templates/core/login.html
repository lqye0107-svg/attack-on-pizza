{% extends 'base.html' %}

{% block title %}Register - Attack on Pizza{% endblock %}

{% block content %}
    <div class="card">
        <h1 class="page-title">Login</h1>

        <form method="post">
            {% csrf_token %}
            {{ form.as_p }}
            <button class="button" type="submit">Login</button>
        </form>

        <p style="margin-top: 16px;">
            If you don't have an account.
            <a href="{% url 'register' %}">Register</a>
        </p>
    </div>
{% endblock %}
