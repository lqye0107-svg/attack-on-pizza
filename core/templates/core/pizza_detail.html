{% extends 'base.html' %}

{% block title %}{{ pizza.name }} - Attack on Pizza{% endblock %}

{% block content %}
    <div class="card">
        {% if pizza.image %}
            <img src="{{ pizza.image.url }}" alt="{{ pizza.name }}" class="detail-image">
        {% endif %}

        <h1 class="page-title">{{ pizza.name }}</h1>
        <p>{{ pizza.description }}</p>

        <form method="post">
            {% csrf_token %}
            {{ form.as_p }}
            <button class="button" type="submit">Add to Cart</button>
        </form>

        <p style="margin-top: 16px;">
            <a href="{% url 'menu' %}">← Back to Menu</a>
        </p>
    </div>
{% endblock %}
